# ============================================================
#  Chess Analyzer - Configuracao
# ============================================================

spring.application.name=chess-analyzer
server.port=8080

# --- Stockfish ---
chess.stockfish-path=C:/APP/Stockfish/stockfish.exe
chess.analysis-depth=15
chess.analysis-time-limit-ms=5000
chess.stockfish-pool-size=16

# --- Cross-Origin Isolation (Stockfish multi-thread no navegador) ---
# Quando true (default), o backend envia COOP/COEP: credentialless em todas as
# respostas, habilitando SharedArrayBuffer. Necessário para os builds
# multi-thread do Stockfish (stockfish-18.js, stockfish-18-lite.js).
# Desligue apenas se algum iframe/popup embutido parar de funcionar.
chess.cross-origin-isolation=${COI_ENABLED:true}

# --- Upload ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Virtual threads (Java 25 / Project Loom) ---
spring.threads.virtual.enabled=true

# ============================================================
#  PostgreSQL / JPA
# ============================================================

spring.datasource.url=${CHESS_DB_URL:jdbc:postgresql://localhost:5432/chess_analysis}
spring.datasource.username=${CHESS_DB_USER:chess}
spring.datasource.password=${CHESS_DB_PASSWORD:chess}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate — sem dialect explicito (Hibernate 7 detecta automaticamente)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================================================
#  Flyway
# ============================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=false

# Datasource explicito para o Flyway (Spring Boot 4 nao herda automaticamente)
spring.flyway.url=${CHESS_DB_URL:jdbc:postgresql://localhost:5432/chess_analysis}
spring.flyway.user=${CHESS_DB_USER:chess}
spring.flyway.password=${CHESS_DB_PASSWORD:chess}
# Permite que o Flyway repare checksums divergentes automaticamente ao iniciar
spring.flyway.out-of-order=false
# OU configure repair no bean manualmente:
spring.flyway.repair-on-migrate=true

# Log do Flyway para diagnostico
logging.level.org.flywaydb=DEBUG

# ============================================================
#  Lichess API
# ============================================================

# Token de acesso pessoal do Lichess (opcional).
# Sem token: apenas partidas públicas, limite de 15 req/min.
# Com token:  partidas próprias + limite mais generoso (60 req/min).
# Gere em: https://lichess.org/account/oauth/token
#chess.lichess-api-token=" "

# Número máximo de partidas a baixar por importação (0 = sem limite).
chess.lichess-max-games=${LICHESS_MAX_GAMES:0}

# Username padrão pré-preenchido no campo de importação do Lichess.
chess.lichess-default-user=${LICHESS_DEFAULT_USER:fjoffly}

# ============================================================
#  IA — "Explicar com IA" no painel ao vivo
# ============================================================
# Provedor a usar:
#   gemini   → Google Gemini (free tier ~15 req/min, 1500 req/dia).
#              Sem custo de processamento no servidor — apenas HTTP-call.
#              Crie a chave em https://aistudio.google.com/apikey
#   lmstudio → LMStudio local (modelo open-source rodando na sua máquina).
ai.provider=${AI_PROVIDER:gemini}

# --- Provider: Gemini (Google) ---
# Cole aqui sua chave gratuita de https://aistudio.google.com/apikey
# (ou exporte como variável de ambiente GEMINI_API_KEY).
ai.gemini.api-key=""

# Modelo Gemini. Free tier (mai/2026): gemini-2.5-flash (top), gemini-2.0-flash,
# gemini-2.0-flash-lite. O 'flash' tem latência baixa e cota generosa.
# Obs: a família gemini-1.5-* foi descontinuada em set/2025.
ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Modelo de fallback se o principal retornar 404/429/503.
# gemini-2.0-flash é mais estável e tem free tier mais generoso (15 RPM, 1500 RPD).
ai.gemini.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-2.0-flash}

# --- Provider: LMStudio local (OpenAI-compat) ---
# Endpoint chamado: POST {chess.lmstudio-url}/v1/chat/completions
chess.lmstudio-url=${LMSTUDIO_URL:http://localhost:1234}

# Identificador do modelo carregado no LMStudio.
# Use "default" para usar automaticamente o modelo que estiver carregado,
# ou informe o nome exato (ex: qwen_qwen3.6-35b-a3b ).
chess.lmstudio-model=${LMSTUDIO_MODEL:phi-3-mini-4k-instruct}

# --- App logging ---
logging.level.com.chess.analyzer=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
