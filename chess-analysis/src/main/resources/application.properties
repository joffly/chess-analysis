# ============================================================
#  Chess Analyzer - Configuracao
# ============================================================

spring.application.name=chess-analyzer
server.port=8080

# --- Stockfish ---
chess.stockfish-path=C:/APP/Stockfish/stockfish.exe
chess.analysis-depth=15
chess.analysis-time-limit-ms=5000
chess.stockfish-pool-size=16

# --- Upload ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Virtual threads (Java 25 / Project Loom) ---
spring.threads.virtual.enabled=true

# ============================================================
#  PostgreSQL / JPA
# ============================================================

spring.datasource.url=${CHESS_DB_URL:jdbc:postgresql://localhost:5432/chess_analysis}
spring.datasource.username=${CHESS_DB_USER:chess}
spring.datasource.password=${CHESS_DB_PASSWORD:chess}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Com Flyway gerenciando o DDL, o Hibernate apenas valida o schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================================================
#  Flyway
# ============================================================

# Flyway e habilitado automaticamente pelo Spring Boot quando o JAR esta no classpath.
# Os scripts ficam em: src/main/resources/db/migration/
# Convencao de nomes: V{versao}__{descricao}.sql   (dois underscores)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# --- Logging ---
logging.level.com.chess.analyzer=INFO
# Para ver SQL do Hibernate:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Para ver execucao do Flyway:
# logging.level.org.flywaydb=DEBUG
