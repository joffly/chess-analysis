# ============================================================
#  Chess Analyzer - Configuracao
# ============================================================

spring.application.name=chess-analyzer
server.port=8080

# --- Stockfish ---
chess.stockfish-path=C:/APP/Stockfish/stockfish.exe
chess.analysis-depth=15
chess.analysis-time-limit-ms=5000
chess.stockfish-pool-size=16

# --- Upload ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Virtual threads (Java 25 / Project Loom) ---
spring.threads.virtual.enabled=true

# ============================================================
#  PostgreSQL / JPA
# ============================================================

# Ajuste host, porta, nome do banco, usuario e senha conforme seu ambiente.
# As variaveis de ambiente sobrescrevem os valores abaixo em producao.
spring.datasource.url=${CHESS_DB_URL:jdbc:postgresql://localhost:5432/chess_analysis}
spring.datasource.username=${CHESS_DB_USER:chess}
spring.datasource.password=${CHESS_DB_PASSWORD:chess}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - pool de conexoes
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# create-drop  -> recria o schema a cada reinicio (uso em dev/testes)
# update       -> aplica apenas as alteracoes necessarias (uso em dev)
# validate     -> apenas valida, sem alterar (uso em producao)
# none         -> desativa DDL automatico (uso em producao com Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# --- Logging ---
logging.level.com.chess.analyzer=INFO
# Para ver SQL gerado pelo Hibernate, mude para DEBUG:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
