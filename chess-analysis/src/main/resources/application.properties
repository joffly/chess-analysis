# ============================================================
#  Chess Analyzer - ConfiguraĂ§ĂŁo
# ============================================================

spring.application.name=chess-analyzer
server.port=8080

# --- Stockfish (pode ser configurado via UI ou aqui) ---
# Exemplos:
#   Windows : chess.stockfish-path=C:/stockfish/stockfish-windows-x86-64.exe
#   Linux   : chess.stockfish-path=/usr/games/stockfish
#   macOS   : chess.stockfish-path=/usr/local/bin/stockfish
chess.stockfish-path=C:/APP/Stockfish/stockfish.exe
chess.analysis-depth=15
chess.analysis-time-limit-ms=5000
chess.stockfish-pool-size=12
# --- Upload (aceita PGNs grandes com muitas partidas) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Virtual threads (Java 25 / Project Loom) ---
spring.threads.virtual.enabled=true

# --- Logging ---
logging.level.com.chess.analyzer=INFO
# Para ver a comunicaçăoo UCI com o Stockfish:
# logging.level.com.chess.analyzer.service.StockfishService=TRACE
